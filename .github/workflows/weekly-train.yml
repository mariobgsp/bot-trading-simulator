name: ML4T Weekly Model Training

on:
  # Run every Sunday at 00:00 UTC (07:00 WIB)
  schedule:
    - cron: "0 0 * * 0"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      model:
        description: "Which model to train (empty = all)"
        required: false
        type: choice
        options:
          - "all"
          - "xgboost"
          - "lstm"
        default: "all"

permissions:
  contents: write

jobs:
  train-xgboost:
    if: github.event_name == 'schedule' || github.event.inputs.model == 'all' || github.event.inputs.model == 'xgboost'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install xgboost joblib tensorflow PyWavelets pykalman

      - name: Restore OHLCV data cache
        uses: actions/cache@v4
        id: ohlcv-cache
        with:
          path: data/ohlcv/
          key: ohlcv-data-${{ hashFiles('config/tickers.py') }}-${{ github.run_number }}
          restore-keys: |
            ohlcv-data-${{ hashFiles('config/tickers.py') }}-
            ohlcv-data-

      - name: Ingest OHLCV data
        run: python -m scripts.ingest
        env:
          PYTHONUNBUFFERED: "1"

      - name: Train XGBoost model
        run: python -m scripts.train_models --xgboost --verbose
        env:
          PYTHONUNBUFFERED: "1"
          TF_CPP_MIN_LOG_LEVEL: "2"

      - name: Upload XGBoost model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-xgboost
          path: data/models/
          retention-days: 1
          overwrite: true

  train-lstm:
    if: github.event_name == 'schedule' || github.event.inputs.model == 'all' || github.event.inputs.model == 'lstm'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install xgboost joblib tensorflow PyWavelets pykalman

      - name: Restore OHLCV data cache
        uses: actions/cache@v4
        id: ohlcv-cache
        with:
          path: data/ohlcv/
          key: ohlcv-data-${{ hashFiles('config/tickers.py') }}-${{ github.run_number }}
          restore-keys: |
            ohlcv-data-${{ hashFiles('config/tickers.py') }}-
            ohlcv-data-

      - name: Ingest OHLCV data
        run: python -m scripts.ingest
        env:
          PYTHONUNBUFFERED: "1"

      - name: Train LSTM model
        run: python -m scripts.train_models --lstm --verbose
        env:
          PYTHONUNBUFFERED: "1"
          TF_CPP_MIN_LOG_LEVEL: "2"

      - name: Upload LSTM model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-lstm
          path: data/models/
          retention-days: 1
          overwrite: true

  commit-models:
    needs: [train-xgboost, train-lstm]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download XGBoost model artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: model-xgboost
          path: data/models/

      - name: Download LSTM model artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: model-lstm
          path: data/models/

      - name: Commit model artifacts
        run: |
          git config user.name "mariobgsp"
          git config user.email "mariobgsp@users.noreply.github.com"
          git add -f data/models/ || true
          git diff --cached --quiet || git commit -m "chore: update ML model artifacts [skip ci]"
          git push || true
