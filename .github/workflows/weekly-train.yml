name: ML4T Weekly Model Training

on:
  # Run every Sunday at 00:00 UTC (07:00 WIB)
  schedule:
    - cron: "0 0 * * 0"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      model:
        description: "Which model to train (empty = all)"
        required: false
        type: choice
        options:
          - "all"
          - "xgboost"
          - "lstm"
        default: "all"

permissions:
  contents: write

jobs:
  train-models:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # ML training can be slow

    steps:
      # ── Setup ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install xgboost joblib tensorflow PyWavelets pykalman

      # ── Restore cached OHLCV data ─────────────────────────────────
      - name: Restore OHLCV data cache
        uses: actions/cache@v4
        id: ohlcv-cache
        with:
          path: data/ohlcv/
          key: ohlcv-data-${{ hashFiles('config/tickers.py') }}-${{ github.run_number }}
          restore-keys: |
            ohlcv-data-${{ hashFiles('config/tickers.py') }}-
            ohlcv-data-

      # ── Ingest latest data ────────────────────────────────────────
      - name: Ingest OHLCV data
        run: python -m scripts.ingest
        env:
          PYTHONUNBUFFERED: "1"

      # ── Train models ──────────────────────────────────────────────
      - name: Train ML models
        run: |
          ARGS=""
          MODEL="${{ github.event.inputs.model }}"
          if [ "$MODEL" = "xgboost" ]; then
            ARGS="--xgboost"
          elif [ "$MODEL" = "lstm" ]; then
            ARGS="--lstm"
          fi
          python -m scripts.train_models $ARGS --verbose
        env:
          PYTHONUNBUFFERED: "1"
          TF_CPP_MIN_LOG_LEVEL: "2"

      # ── Commit trained models back to repo ─────────────────────────
      - name: Commit model artifacts
        run: |
          git config user.name "mariobgsp"
          git config user.email "mariobgsp@users.noreply.github.com"
          git add -f data/models/ || true
          git diff --cached --quiet || git commit -m "chore: update ML model artifacts [skip ci]"
          git push || true
