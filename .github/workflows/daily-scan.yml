name: IHSG Daily Scan

on:
  # Run at 23:30 WIB (16:30 UTC) every weekday (Mon-Fri)
  schedule:
    - cron: "30 16 * * 1-5"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      tickers:
        description: "Space-separated tickers (empty = all stored)"
        required: false
        default: ""
      check_earnings:
        description: "Check for upcoming earnings"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Setup ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Restore cached OHLCV data ─────────────────────────────────
      - name: Restore OHLCV data cache
        uses: actions/cache@v4
        id: ohlcv-cache
        with:
          path: data/ohlcv/
          key: ohlcv-data-${{ hashFiles('config/tickers.py') }}-${{ github.run_number }}
          restore-keys: |
            ohlcv-data-${{ hashFiles('config/tickers.py') }}-
            ohlcv-data-

      # ── Ingest data (resume mode — skips existing) ────────────────
      - name: Ingest OHLCV data
        run: python -m scripts.ingest
        env:
          PYTHONUNBUFFERED: "1"

      # ── Run daily scan ────────────────────────────────────────────
      - name: Run daily scan
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS="--tickers ${{ github.event.inputs.tickers }}"
          fi
          if [ "${{ github.event.inputs.check_earnings }}" = "true" ]; then
            ARGS="$ARGS --check-earnings"
          fi
          python -m scripts.daily $ARGS
        env:
          PYTHONUNBUFFERED: "1"

      # ── Upload reports as artifacts ───────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report-${{ github.run_number }}
          path: reports/*.html
          retention-days: 30

      - name: Upload alert log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: alerts-${{ github.run_number }}
          path: logs/alerts.log
          retention-days: 30

      # ── Commit updated data back to repo (optional) ───────────────
      - name: Commit tracking and portfolio state
        run: |
          git config user.name "mariobgsp"
          git config user.email "mariobgsp@users.noreply.github.com"
          git add -f data/daily_tracking.json || true
          git add -f data/daily_tracking.md || true
          git add -f data/portfolio.json || true
          git add -f data/paper_portfolio.json || true
          git add -f data/paper_portfolio.md || true
          git diff --cached --quiet || git commit -m "chore: update daily tracking data [skip ci]"
          git push || true
